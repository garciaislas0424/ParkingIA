<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parking IA Express</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:750px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#111827;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

.fecha{
    text-align:center;
    font-weight:bold;
    margin-bottom:20px;
    color:#444;
}

input,
select{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

.preview{
    margin-top:20px;
}

.preview img{
    width:100%;
    border-radius:15px;
    border:2px solid #ddd;
}

.aviso{
    margin-top:15px;
    background:#f1f5f9;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
}

.ticket{
    margin-top:25px;
    border:2px dashed #000;
    padding:20px;
    border-radius:10px;
    background:#fff;
}

.ticket h2{
    text-align:center;
    margin-bottom:15px;
}

.ticket p{
    margin-top:10px;
    font-size:15px;
}

.print{
    background:#111827;
}

#qrContainer{
    margin-top:25px;
    text-align:center;
    display:none;
}

#qrCanvas{
    margin-top:15px;
}

@media print{

    body{
        background:white;
    }

    .no-print{
        display:none;
    }

    .card{
        box-shadow:none;
        border:none;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🚗 Parking IA Express</h1>

<p class="sub">
Registro inteligente de estacionamiento
</p>

<div class="fecha" id="fechaActual"></div>

<!-- DATOS -->

<input
type="text"
id="nombre"
placeholder="Nombre del cliente">

<input
type="tel"
id="telefono"
placeholder="Número telefónico"
inputmode="numeric">

<select id="unidad">

<option value="">
Tipo de unidad
</option>

<option>
Carro
</option>

<option>
Camioneta
</option>

<option>
Moto
</option>

</select>

<div class="aviso">
📸 TOMAR FOTO FRONTAL DE PLACAS
</div>

<input
type="file"
accept="image/*"
capture="environment"
id="foto">

<div class="preview">

<img
id="preview"
style="display:none;">

</div>

<input
type="text"
id="placas"
placeholder="Ingresar número de placas">

<!-- BOTONES -->

<button
class="no-print"
onclick="generarTicket()">

🎫 Generar Ticket

</button>

<button
class="print no-print"
onclick="window.print()">

🖨️ Imprimir Ticket

</button>

<button
class="no-print"
onclick="generarQRPagina()">

📱 Generar QR Página

</button>

<button
class="no-print"
onclick="enviarCliente()">

📲 Enviar Ticket Cliente

</button>

<button
class="no-print"
onclick="enviarAdmin()">

📨 Enviar Registro Admin

</button>

<!-- TICKET -->

<div
class="ticket"
id="ticket"
style="display:none;">

<h2>🚗 PARKING IA EXPRESS</h2>

<hr>

<p>
<strong>FOLIO:</strong>
<span id="tFolio"></span>
</p>

<p>
<strong>CLIENTE:</strong>
<span id="tNombre"></span>
</p>

<p>
<strong>TELÉFONO:</strong>
<span id="tTelefono"></span>
</p>

<p>
<strong>UNIDAD:</strong>
<span id="tUnidad"></span>
</p>

<p>
<strong>PLACAS:</strong>
<span id="tPlacas"></span>
</p>

<p>
<strong>FECHA:</strong>
<span id="tFecha"></span>
</p>

<hr>

<p style="text-align:center;">
Conserve su ticket
</p>

</div>

<!-- QR -->

<div id="qrContainer">

<h3>
📱 QR DE ACCESO
</h3>

<canvas id="qrCanvas"></canvas>

</div>

</div>

</div>

<script>

// FECHA
function actualizarFecha(){

    const fecha =
    new Date().toLocaleString("es-MX",{

        dateStyle:"full",
        timeStyle:"short"

    });

    document.getElementById("fechaActual")
    .innerHTML = fecha;

}

actualizarFecha();

// FOTO PREVIEW
const foto =
document.getElementById("foto");

foto.addEventListener("change",function(){

    const archivo =
    this.files[0];

    if(archivo){

        const reader =
        new FileReader();

        reader.onload = function(e){

            const preview =
            document.getElementById("preview");

            preview.src =
            e.target.result;

            preview.style.display =
            "block";

        }

        reader.readAsDataURL(archivo);

    }

});

// GENERAR FOLIO
function generarFolio(){

    const ahora =
    new Date();

    return "PK-" +

    ahora.getFullYear() +

    (ahora.getMonth()+1)
    .toString()
    .padStart(2,"0") +

    ahora.getDate()
    .toString()
    .padStart(2,"0") +

    "-" +

    ahora.getHours()
    .toString()
    .padStart(2,"0") +

    ahora.getMinutes()
    .toString()
    .padStart(2,"0") +

    ahora.getSeconds()
    .toString()
    .padStart(2,"0");

}

// GENERAR TICKET
function generarTicket(){

    const nombre =
    document.getElementById("nombre")
    .value;

    const telefono =
    document.getElementById("telefono")
    .value;

    const unidad =
    document.getElementById("unidad")
    .value;

    const placas =
    document.getElementById("placas")
    .value;

    if(nombre === "" ||
       telefono === "" ||
       unidad === "" ||
       placas === ""){

        alert(
        "Completa todos los campos"
        );

        return;

    }

    const fecha =
    new Date().toLocaleString();

    const folio =
    generarFolio();

    document.getElementById("ticket")
    .style.display = "block";

    document.getElementById("tFolio")
    .innerHTML = folio;

    document.getElementById("tNombre")
    .innerHTML = nombre;

    document.getElementById("tTelefono")
    .innerHTML = telefono;

    document.getElementById("tUnidad")
    .innerHTML = unidad;

    document.getElementById("tPlacas")
    .innerHTML = placas;

    document.getElementById("tFecha")
    .innerHTML = fecha;

}

// QR PAGINA
function generarQRPagina(){

    const url =
    "https://parkingia.pages.dev/";

    const qrContainer =
    document.getElementById("qrContainer");

    const canvas =
    document.getElementById("qrCanvas");

    qrContainer.style.display =
    "block";

    const ctx =
    canvas.getContext("2d");

    ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
    );

    QRCode.toCanvas(

        canvas,

        url,

        {
            width:250
        },

        function(error){

            if(error){

                console.error(error);

                alert(
                "Error al generar QR"
                );

            }

        }

    );

}

// WHATSAPP CLIENTE
function enviarCliente(){

    const telefonoCliente =
    document.getElementById("telefono")
    .value
    .toString()
    .replace(/\D/g,'');

    const unidad =
    document.getElementById("unidad")
    .value;

    const placas =
    document.getElementById("placas")
    .value;

    const folio =
    document.getElementById("tFolio")
    .innerHTML;

    const fecha =
    document.getElementById("tFecha")
    .innerHTML;

    if(folio === ""){

        alert(
        "Primero genera el ticket"
        );

        return;

    }

    const mensaje =

`🎫 PARKING IA EXPRESS %0A%0A

🚗 Registro realizado correctamente %0A%0A

🎫 Folio:
${folio}%0A

🚘 Unidad:
${unidad}%0A

🔢 Placas:
${placas}%0A

🕒 Fecha:
${fecha}%0A%0A

✅ Conserve este ticket`;

    window.open(

`https://wa.me/52${telefonoCliente}?text=${mensaje}`,

"_blank"

);

}

// TELEGRAM ADMIN
async function enviarAdmin(){

    const nombre =
    document.getElementById("nombre")
    .value;

    const telefono =
    document.getElementById("telefono")
    .value;

    const unidad =
    document.getElementById("unidad")
    .value;

    const placas =
    document.getElementById("placas")
    .value;

    const folio =
    document.getElementById("tFolio")
    .innerHTML;

    const fecha =
    document.getElementById("tFecha")
    .innerHTML;

    const foto =
    document.getElementById("foto")
    .files[0];

    if(!foto){

        alert(
        "Toma la foto primero"
        );

        return;

    }

    // TOKEN TELEGRAM
    const token =
    "";

    // CHAT ID
    const chatId =
    "";

    const mensaje =

`🚗 NUEVO INGRESO PARKING

🎫 Folio:
${folio}

👤 Cliente:
${nombre}

📞 Teléfono:
${telefono}

🚘 Unidad:
${unidad}

🔢 Placas:
${placas}

🕒 Fecha:
${fecha}`;

    const formData =
    new FormData();

    formData.append(
    "chat_id",
    chatId
    );

    formData.append(
    "caption",
    mensaje
    );

    formData.append(
    "photo",
    foto
    );

    await fetch(

`https://api.telegram.org/bot${token}/sendPhoto`,

{
    method:"POST",
    body:formData
}

);

    alert(
    "✅ Registro enviado al administrador"
    );

}

</script>

</body>
</html>
